<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title ?: 'Nailology - Tiệm Nails & Cà Phê Cao Cấp'}">Nailology</title>
    <meta name="description" th:content="${description ?: 'Trải nghiệm mới với nails & coffee culture'}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Lora', serif;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    
    <main>
        <div th:replace="~{fragments/hero :: hero}"></div>
        <div th:replace="~{fragments/location-selector :: location-selector}"></div>
        <div th:replace="~{fragments/services :: services}"></div>
        <div th:replace="~{fragments/about :: about}"></div>
        <div th:replace="~{fragments/gallery :: gallery}"></div>
        <div th:replace="~{fragments/contact :: contact}"></div>
    </main>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
    
    <!-- Booking Modal -->
    <div id="bookingModal" class="modal-overlay hidden" onclick="closeBookingModal(event)">
        <div onclick="event.stopPropagation()">
            <div class="bg-white rounded-lg p-8 max-w-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-serif" style="color: #3d3d3d;">Đặt Lịch Hẹn</h2>
                    <button 
                        onclick="closeBookingModal()"
                        class="text-2xl text-gray-400 hover:text-gray-600"
                    >
                        ×
                    </button>
                </div>
                <div class="bg-blue-50 p-6 rounded-lg border border-blue-200">
                    <p class="text-gray-700 mb-4">
                        Chọn dịch vụ và đặt lịch hẹn với chúng tôi:
                    </p>
                    <a th:href="@{/booking}"
                       class="inline-block px-6 py-3 text-white rounded hover:opacity-90 transition"
                       style="background-color: #c4a080;">
                        Đặt Lịch Ngay
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/main.js}"></script>
    <script>
        // Booking modal functionality
        function showBookingModal() {
            document.getElementById('bookingModal').classList.remove('hidden');
        }
        
        function closeBookingModal(event) {
            if (!event || event.target === event.currentTarget) {
                document.getElementById('bookingModal').classList.add('hidden');
            }
        }
        
        // Update header booking button to show modal
        document.addEventListener('DOMContentLoaded', function() {
            // The header booking link will navigate directly, but we can add modal trigger if needed
            // For now, the modal is shown via JavaScript when needed
        });
    </script>
</body>
</html>

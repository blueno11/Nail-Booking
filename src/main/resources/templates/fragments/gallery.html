<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <section th:fragment="gallery" id="gallery" class="py-16 md:py-24" style="background-color: #f5f1ed;">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-12">
                <p class="text-sm font-semibold mb-2" style="color: #c4a080;">TÁC PHẨM</p>
                <h2 class="text-3xl md:text-4xl font-serif" style="color: #3d3d3d;">
                    Hình Ảnh Của Chúng Tôi
                </h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="relative bg-gray-200 rounded h-64 overflow-hidden hover:shadow-lg transition hover:scale-105 duration-300 group">
                    <img th:src="@{/images/placeholder.jpg}" 
                         alt="Nail Art Hoa"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition flex items-end p-4">
                        <p class="text-white font-serif text-lg opacity-0 group-hover:opacity-100 transition">Nail Art Hoa</p>
                    </div>
                </div>
                <div class="relative bg-gray-200 rounded h-64 overflow-hidden hover:shadow-lg transition hover:scale-105 duration-300 group">
                    <img th:src="@{/images/placeholder.jpg}" 
                         alt="Ombre Gradient"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition flex items-end p-4">
                        <p class="text-white font-serif text-lg opacity-0 group-hover:opacity-100 transition">Ombre Gradient</p>
                    </div>
                </div>
                <div class="relative bg-gray-200 rounded h-64 overflow-hidden hover:shadow-lg transition hover:scale-105 duration-300 group">
                    <img th:src="@{/images/placeholder.jpg}" 
                         alt="Geometric Pattern"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition flex items-end p-4">
                        <p class="text-white font-serif text-lg opacity-0 group-hover:opacity-100 transition">Geometric Pattern</p>
                    </div>
                </div>
                <div class="relative bg-gray-200 rounded h-64 overflow-hidden hover:shadow-lg transition hover:scale-105 duration-300 group">
                    <img th:src="@{/images/placeholder.jpg}" 
                         alt="Glitter Sparkle"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition flex items-end p-4">
                        <p class="text-white font-serif text-lg opacity-0 group-hover:opacity-100 transition">Glitter Sparkle</p>
                    </div>
                </div>
                <div class="relative bg-gray-200 rounded h-64 overflow-hidden hover:shadow-lg transition hover:scale-105 duration-300 group">
                    <img th:src="@{/images/placeholder.jpg}" 
                         alt="French Tip Classic"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition flex items-end p-4">
                        <p class="text-white font-serif text-lg opacity-0 group-hover:opacity-100 transition">French Tip Classic</p>
                    </div>
                </div>
                <div class="relative bg-gray-200 rounded h-64 overflow-hidden hover:shadow-lg transition hover:scale-105 duration-300 group">
                    <img th:src="@{/images/placeholder.jpg}" 
                         alt="Holographic Design"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition flex items-end p-4">
                        <p class="text-white font-serif text-lg opacity-0 group-hover:opacity-100 transition">Holographic Design</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <section th:fragment="gallery" id="gallery" class="py-16 md:py-24" style="background-color: #f5f1ed;">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-12">
                <p class="text-sm font-semibold mb-2" style="color: #c4a080;">TÁC PHẨM</p>
                <h2 class="text-3xl md:text-4xl font-serif" style="color: #3d3d3d;">
                    Hình Ảnh Của Chúng Tôi
                </h2>
            </div>

            <div th:if="${galleryItems and #lists.size(galleryItems) > 0}"
                 class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div th:each="item : ${galleryItems}"
                     class="relative bg-gray-200 rounded h-64 overflow-hidden hover:shadow-lg transition hover:scale-105 duration-300 group">
                    <img th:src="${item.imageUrl}"
                         th:alt="${item.title}"
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-300">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition flex items-end p-4">
                        <div>
                            <p class="text-white font-serif text-lg opacity-0 group-hover:opacity-100 transition"
                               th:text="${item.title}">Nail Art</p>
                            <p class="text-white text-sm opacity-0 group-hover:opacity-100 transition delay-75"
                               th:text="${item.caption}">
                                Caption
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <p th:if="${galleryItems == null or #lists.isEmpty(galleryItems)}"
               class="text-center text-gray-500">
                Bộ sưu tập sẽ được hiển thị ngay khi có nội dung.
            </p>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <section th:fragment="contact" id="contact" class="py-16 md:py-24 bg-white">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-12">
                <h2 class="text-3xl md:text-4xl font-serif mb-4" style="color: #3d3d3d;">
                    Liên Hệ Với Chúng Tôi
                </h2>
                <p class="text-gray-600">
                    Có câu hỏi? Liên hệ với chúng tôi ngay hôm nay
                </p>
                <div th:if="${success}" class="mt-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
                    <p th:text="${success}"></p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                <div>
                    <h3 class="text-xl font-serif mb-6" style="color: #3d3d3d;">Thông Tin Liên Hệ</h3>
                    <div class="space-y-4">
                        <div>
                            <p class="text-sm font-semibold mb-1" style="color: #c4a080;">ĐIỆN THOẠI</p>
                            <p class="text-gray-600">+61 3 XXXX XXXX</p>
                        </div>
                        <div>
                            <p class="text-sm font-semibold mb-1" style="color: #c4a080;">EMAIL</p>
                            <p class="text-gray-600">hello@nailology.com.au</p>
                        </div>
                        <div>
                            <p class="text-sm font-semibold mb-1" style="color: #c4a080;">ĐỊA CHỈ</p>
                            <p class="text-gray-600">Melbourne, Australia</p>
                        </div>
                    </div>
                </div>

                <form class="space-y-4" th:action="@{/contact}" method="post">
                    <input type="text" 
                           name="name"
                           placeholder="Tên của bạn" 
                           class="w-full px-4 py-3 border rounded focus:outline-none"
                           style="border-color: #c4a080;" required>
                    <input type="email" 
                           name="email"
                           placeholder="Email của bạn" 
                           class="w-full px-4 py-3 border rounded focus:outline-none"
                           style="border-color: #c4a080;" required>
                    <textarea name="message"
                              placeholder="Tin nhắn của bạn" 
                              rows="4"
                              class="w-full px-4 py-3 border rounded focus:outline-none"
                              style="border-color: #c4a080;" required></textarea>
                    <button type="submit"
                            class="w-full px-6 py-3 text-white rounded hover:opacity-90 transition"
                            style="background-color: #c4a080;">
                        Gửi
                    </button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <section th:fragment="services" id="services" class="py-16 md:py-24" style="background-color: #f5f1ed;">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-12">
                <p class="text-sm font-semibold mb-2" style="color: #c4a080;">DỊCH VỤ</p>
                <h2 class="text-3xl md:text-4xl font-serif" style="color: #3d3d3d;">
                    Dịch Vụ Của Chúng Tôi
                </h2>
            </div>

            <div th:if="${featuredServices and #lists.size(featuredServices) > 0}"
                 class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div th:each="service : ${featuredServices}"
                     class="bg-white p-8 rounded border border-gray-200 hover:shadow-lg transition"
                     style="border-color: #c4a080;">
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-xl font-serif" style="color: #3d3d3d;" th:text="${service.name}">Dịch Vụ</h3>
                        <span class="font-semibold text-sm" style="color: #c4a080;"
                              th:text="${'từ ' + service.startingPrice + ' AUD'}">
                            từ 0 AUD
                        </span>
                    </div>
                    <p class="text-gray-600" th:text="${service.description}">
                        Mô tả dịch vụ
                    </p>
                    <p class="text-sm text-gray-400 mt-3">
                        <span th:text="${service.durationLabel}">1 hr</span> •
                        <span th:text="${service.categoryLabel}">Category</span>
                    </p>
                </div>
            </div>
            <p th:if="${featuredServices == null or #lists.isEmpty(featuredServices)}"
               class="text-center text-gray-500">
                Dữ liệu dịch vụ đang được cập nhật.
            </p>
        </div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <section th:fragment="location-selector" class="py-16 md:py-24 bg-white">
        <div class="max-w-7xl mx-auto px-4">
            <div class="text-center mb-12">
                <p class="text-sm font-semibold mb-2" style="color: #c4a080;">ĐẶT LỊCH</p>
                <h2 class="text-3xl md:text-4xl font-serif mb-4" style="color: #3d3d3d;">
                    Giữ Lại Thời Gian Của Bạn
                </h2>
                <p class="text-gray-600 max-w-2xl mx-auto">
                    Tiết kiệm thời gian và đặt trước dịch vụ của bạn để có một trải nghiệm mượt mà
                </p>
            </div>

            <div class="mb-12">
                <h3 class="text-xl font-serif mb-8 text-center" style="color: #3d3d3d;">
                    Chọn Vị Trí Của Bạn:
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="rounded overflow-hidden hover:shadow-lg transition cursor-pointer aspect-square flex items-center justify-center"
                         style="background-color: #3d3d3d;">
                        <div class="text-center text-white">
                            <p class="text-lg font-semibold">KEW</p>
                            <p class="text-sm text-gray-300">3104</p>
                        </div>
                    </div>
                    <div class="rounded overflow-hidden hover:shadow-lg transition cursor-pointer aspect-square flex items-center justify-center"
                         style="background-color: #3d3d3d;">
                        <div class="text-center text-white">
                            <p class="text-lg font-semibold">ALPHINGTON</p>
                            <p class="text-sm text-gray-300">3078</p>
                        </div>
                    </div>
                    <div class="rounded overflow-hidden hover:shadow-lg transition cursor-pointer aspect-square flex items-center justify-center"
                         style="background-color: #3d3d3d;">
                        <div class="text-center text-white">
                            <p class="text-lg font-semibold">TRUGANINA</p>
                            <p class="text-sm text-gray-300">3029</p>
                        </div>
                    </div>
                    <div class="rounded overflow-hidden hover:shadow-lg transition cursor-pointer aspect-square flex items-center justify-center"
                         style="background-color: #3d3d3d;">
                        <div class="text-center text-white">
                            <p class="text-lg font-semibold">HAMPTON</p>
                            <p class="text-sm text-gray-300">3188</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <button onclick="showBookingModal()"
                   class="inline-block px-8 py-3 text-white rounded hover:opacity-90 transition"
                   style="background-color: #c4a080;">
                    Đặt Lịch Ngay
                </button>
            </div>
        </div>
    </section>
</body>
</html>

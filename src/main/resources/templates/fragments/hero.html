<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <section th:fragment="hero" class="py-16 md:py-24 relative overflow-hidden" style="background-color: #f5f1ed;">
        <div class="absolute top-0 right-0 w-64 h-64 rounded-full opacity-10 -mr-32 -mt-32" style="background-color: #d4af9e;"></div>
        
        <div class="max-w-7xl mx-auto px-4 text-center relative z-10">
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-serif mb-6 text-pretty" style="color: #3d3d3d;">
                Trải Nghiệm Mới Với<br/>Nails & Coffee Culture
            </h1>
            <p class="text-lg mb-12 max-w-2xl mx-auto leading-relaxed" style="color: #666;">
                Chăm sóc bản thân, thư giãn tâm hồn. Tại Nailology, chúng tôi mang đến cho bạn một không gian thoải mái để làm đẹp và thưởng thức cà phê chất lượng cao.
            </p>
            <button onclick="showBookingModal()"
               class="inline-block px-8 py-4 text-white text-lg rounded hover:opacity-80 transition font-semibold"
               style="background-color: #c4a080;">
                Đặt Lịch Hẹn Ngay
            </button>
        </div>
    </section>
</body>
</html>
